<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#06080f" />
    <title>줍줍일지</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="ambient" aria-hidden="true">
      <div class="orb orb-a"></div>
      <div class="orb orb-b"></div>
      <div class="orb orb-c"></div>
      <div class="scanline"></div>
      <div class="grain"></div>
    </div>

    <div id="app">
      <section id="screen-welcome" class="screen active">
        <h1 class="sigil sigil-brand">줍줍일지</h1>
        <p class="sigil-sub">오늘 줍은 것</p>
        <button id="btn-start" class="portal-btn" aria-label="시작">
          <canvas class="portal-trail" aria-hidden="true"></canvas>
          <span class="portal-aura"></span>
          <span class="portal-ring portal-ring-outer"></span>
          <span class="portal-ring portal-ring-mid"></span>
          <span class="portal-orbit"></span>
          <span class="portal-core">
            <span class="portal-core-inner"></span>
          </span>
          <span class="portal-flare" aria-hidden="true"></span>
        </button>
      </section>

      <section id="screen-camera" class="screen screen-fill">
        <div class="cam-stage">
          <video id="camera-video" playsinline autoplay muted></video>
          <canvas id="camera-canvas" hidden></canvas>
          <div class="cam-vignette" aria-hidden="true"></div>
        </div>
        <header class="bar bar-float bar-top cam-bar">
          <button id="btn-camera-back" class="icon-btn" aria-label="뒤로">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
              <path d="M15 6l-6 6 6 6" />
            </svg>
          </button>
        </header>
        <div class="cam-bottom">
          <div id="cam-zoom-swipe" class="cam-zoom-swipe" aria-label="좌우로 밀어 줌 조절">
            <div class="cam-zoom-rail">
              <span class="cam-zoom-fill" id="zoom-fill"></span>
              <span class="cam-zoom-thumb" id="zoom-thumb"></span>
            </div>
            <span id="zoom-label" class="cam-zoom-swipe-label">1×</span>
          </div>
          <button id="btn-capture" class="shutter shutter-hero" aria-label="촬영">
            <span class="shutter-ring shutter-ring-outer"></span>
            <span class="shutter-halo"></span>
            <span class="shutter-core"></span>
          </button>
        </div>
      </section>

      <section id="screen-preview" class="screen screen-fill">
        <div class="scan-stage">
          <img id="preview-original" alt="" />
          <div id="scan-cutout-wrap" class="scan-cutout-wrap">
            <div class="cutout-bg" aria-hidden="true"></div>
            <img id="preview-cutout" alt="" />
          </div>
          <canvas id="subject-border" class="subject-border-canvas" hidden aria-hidden="true"></canvas>
          <canvas id="scan-sweep" class="scan-sweep" aria-hidden="true"></canvas>
          <div class="scan-shimmer" aria-hidden="true"></div>
          <p id="scan-status" class="scan-status-float">줍는 중…</p>
          <div id="scan-beam" class="scan-beam" aria-hidden="true"></div>
        </div>
        <footer class="preview-dock">
          <button id="btn-preview-camera" class="dock-btn" aria-label="다시 찍기">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
              <path d="M4 8h2l2-3h8l2 3h2a2 2 0 012 2v9a2 2 0 01-2 2H4a2 2 0 01-2-2V10a2 2 0 012-2z" />
              <circle cx="12" cy="14" r="3.5" />
            </svg>
            <span>다시찍기</span>
          </button>
          <button id="btn-preview-box" class="dock-btn dock-btn-main" aria-label="상자에 넣기">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
              <path d="M4 9l8-4 8 4v10l-8 4-8-4V9z" />
              <path d="M12 5v18M4 9l8 4 8-4" />
            </svg>
            <span>상자에넣기</span>
          </button>
          <button id="btn-preview-share" class="dock-btn" aria-label="공유하기">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
              <path d="M12 16V4M12 4l-4 4M12 4l4 4" />
              <path d="M5 20h14" />
            </svg>
            <span>공유하기</span>
          </button>
        </footer>
      </section>

      <section id="screen-box" class="screen">
        <div class="vessel-full">
          <canvas id="physics-canvas"></canvas>
          <div class="vessel-edge" aria-hidden="true"></div>
        </div>

        <header class="box-topbar bar-float bar-top">
          <button id="btn-box-back" class="topbar-back" type="button" aria-label="나가기">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
              <path d="M15 6l-6 6 6 6" />
            </svg>
            <span>나가기</span>
          </button>
          <div class="topbar-brand">
            <span class="topbar-title">줍줍일지</span>
            <span class="topbar-count"><em id="box-count">0</em>개</span>
          </div>
          <div class="topbar-actions">
            <button id="btn-share" class="topbar-icon" type="button" aria-label="공유" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                <path d="M12 16V4M12 4l-4 4M12 4l4 4" />
                <path d="M5 20h14" />
              </svg>
            </button>
            <button id="btn-add-more" class="topbar-icon topbar-icon-accent" type="button" aria-label="더 찍기">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                <path d="M4 8h2l2-3h8l2 3h2a2 2 0 012 2v9a2 2 0 01-2 2H4a2 2 0 01-2-2V10a2 2 0 012-2z" />
                <circle cx="12" cy="14" r="3.5" />
              </svg>
            </button>
          </div>
        </header>

        <div id="share-sheet" class="share-sheet" hidden>
          <div class="share-sheet-panel share-sheet-panel-wide">
            <button id="btn-share-kakao-direct" class="kakao-btn kakao-btn-sheet" type="button">
              카카오톡으로 보내기
            </button>
            <div class="share-sheet-row">
            <button id="btn-share-snapshot" class="share-option" type="button">
              <span class="share-option-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                  <rect x="4" y="5" width="16" height="14" rx="2" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </span>
              <span class="share-option-label">상자 캡처</span>
            </button>
            <button id="btn-share-items" class="share-option" type="button">
              <span class="share-option-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                  <rect x="4" y="4" width="7" height="7" rx="1.2" />
                  <rect x="13" y="4" width="7" height="7" rx="1.2" />
                  <rect x="4" y="13" width="7" height="7" rx="1.2" />
                  <rect x="13" y="13" width="7" height="7" rx="1.2" />
                </svg>
              </span>
              <span class="share-option-label">줍줍 모음</span>
            </button>
            </div>
          </div>
        </div>
      </section>

      <div id="camera-intro" class="camera-intro" hidden>
        <div class="camera-intro-panel">
          <p class="camera-intro-title">카메라를 사용해요</p>
          <p class="camera-intro-desc">오늘 줍은 것을 찍어 일지에 담아요.<br />처음 한 번만 허용하면 됩니다.</p>
          <button id="btn-camera-allow" class="kakao-btn camera-allow-btn" type="button">카메라 허용하고 시작</button>
          <button id="btn-camera-intro-cancel" class="share-save-btn" type="button">취소</button>
        </div>
      </div>
    </div>

    <div id="share-preview" class="share-preview" hidden>
      <div class="share-preview-panel">
        <button id="btn-share-close" class="icon-btn share-close" aria-label="닫기">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <path d="M6 6l12 12M18 6L6 18" />
          </svg>
        </button>
        <img id="share-preview-img" alt="공유할 이미지" />
        <p class="share-preview-hint">카카오톡을 선택해서 보내세요</p>
        <button id="btn-share-kakao" class="kakao-btn" type="button">카카오톡으로 보내기</button>
        <button id="btn-share-save" class="share-save-btn" type="button">저장하기</button>
      </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
